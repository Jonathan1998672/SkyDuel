<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>SKY DUEL</title>
    <link rel="stylesheet" href="style.css">

    <!--Fuentes-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Keania+One&display=swap" rel="stylesheet">


</head>

<body>

    <!--FONDO ANIMADO-->
    <div class="background">
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
    </div>

    <div id="authMenu" class="screen active">
        <h1 class="logo">SKY DUEL</h1>
        <div class="auth-container">
            <h2>LOGIN</h2>
            <input type="text" id="loginUser" placeholder="Usuario">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <button onclick="handleLogin()">ENTRAR</button>
            <p>¿No tienes cuenta? <span class="link" onclick="showScreen('registerMenu')">Regístrate aquí</span></p>
        </div>
    </div>

    <div id="registerMenu" class="screen">
        <h1 class="logo">SKY DUEL</h1>
        <div class="auth-container">
            <h2>CREAR CUENTA</h2>
            <input type="text" id="regUser" placeholder="Nuevo Usuario">
            <input type="password" id="regPass" placeholder="Nueva Contraseña">
            <button onclick="handleRegister()">REGISTRARSE</button>
            <button class="btn-small" onclick="showScreen('authMenu')">VOLVER</button>
        </div>
    </div>

    <div id="mainMenu" class="screen">
        <h1 class="logo">SKY DUEL</h1>
        <button onclick="showScreen('connectionMenu')">JUGAR</button>
        <button onclick="settingsOrigin = 'mainMenu'; showScreen('settingsMenu')">CONFIGURACIÓN</button>
        <button onclick="showScreen('scoreMenu')">PUNTUACIONES</button>
    </div>

    <div id="userDisplay" class="user-tag hidden">
        PILOTO: <span id="currentUserName"></span>
    </div>

    <!--SELECCION DE MODO-->
    <div id="connectionMenu" class="screen">
        <h2>TIPO DE CONEXIÓN</h2>
        <button onclick="showScreen('modeMenu')">LOCAL</button>
        <button onclick="alert('Servidores no disponibles por el momento.')">MULTIJUGADOR</button>
        <button onclick="showScreen('mainMenu')">VOLVER</button>
    </div>

    <div id="modeMenu" class="screen">
        <h2>MODO LOCAL</h2>
        <button onclick="startGame('race')">CARRERAS</button>
        <button onclick="startGame('combat')">COMBATE</button>
        <button onclick="showScreen('connectionMenu')">VOLVER</button>
    </div>

    <!--CONFIGURACION-->
    <div id="settingsMenu" class="screen">
        <div class="settings-container">
            <h2>CONFIGURACIÓN</h2>

            <div class="settings-layout">
                <div class="settings-tabs">
                    <button class="tab-btn active" onclick="showSettingsSection('accountSection')">CUENTA</button>
                    <button class="tab-btn" onclick="showSettingsSection('audioSection')">AUDIO</button>
                </div>

                <div class="settings-content">
                    <div id="accountSection" class="settings-panel active">
                        <h3>PERFIL DEL PILOTO</h3>
                        <div class="info-box">
                            <p>USUARIO: <span id="displayUser">---</span></p>
                            <p>RANGO: <span id="userRank">RECLUTA</span></p>
                        </div>
                        <button class="btn-danger" onclick="logout()">CERRAR SESIÓN</button>
                    </div>

                    <div id="audioSection" class="settings-panel">
                        <h3>AJUSTES DE SONIDO</h3>
                        <div class="control-group">
                            <label>MÚSICA</label>
                            <input type="range" id="musicVol" min="0" max="1" step="0.1" value="0.4"
                                onchange="updateVolume()">
                        </div>
                        <div class="control-group">
                            <label>EFECTOS (SFX)</label>
                            <input type="range" id="sfxVol" min="0" max="1" step="0.1" value="0.8">
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn-back" onclick="backFromSettings()">VOLVER</button>
        </div>
    </div>

    <!--SCOREBOARD-->
    <div id="scoreMenu" class="screen">
        <h2>TOP PILOTOS</h2>

        <div class="score-filters">
            <button class="filter-btn active" onclick="loadScores('CARRERA')">CARRERA</button>
            <button class="filter-btn" onclick="loadScores('COMBATE')">COMBATE</button>
        </div>

        <div class="score-container">
            <table id="highScoresTable">
                <thead>
                    <tr>
                        <th>POS</th>
                        <th>PILOTO</th>
                        <th>PUNTOS</th>
                    </tr>
                </thead>
                <tbody id="scoreBoard">
                </tbody>
            </table>
        </div>
        <button onclick="showScreen('mainMenu')">VOLVER</button>
    </div>

    <!--JUEGO-->
    <div id="gameScreen" class="screen">
        <div id="hud">
            <div>MODO: <span id="modeText"></span></div>
        </div>

        <div id="dynamicHUD" class="bottom-right-hud">
            <div id="statsInfo" class="stats-counter">--</div>
            <div class="bar-container">
                <img id="dynamicBar" src="" alt="Barra de estado">
            </div>
        </div>

        <div id="pauseMenu" class="pause hidden">
            <h2>PAUSA</h2>
            <button onclick="resumeGame()">Reanudar</button>
            <button onclick="openSettingsFromGame()">CONFIGURACIÓN</button>
            <button onclick="exitGame()">Salir</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
            }
        }
    </script>

    <audio id="bgMusic" loop></audio>

    <script type="module" src="script.js"></script>


</body>

</html>
